spring.application.name=atlas

# Force the DispatcherServlet to initialize instantly on boot
spring.mvc.servlet.load-on-startup=1

# ===============================
# SQLite Database Configuration
# ===============================
# Points to a local file in your project folder
spring.datasource.url=jdbc:sqlite:src/main/resources/data/atlas_prefs.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate settings for SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# Automatically creates the 'user_fact' table if it doesn't exist
spring.jpa.hibernate.ddl-auto=update
# Helpful for debugging what Java is saving
spring.jpa.show-sql=true

# ===============================
# LangChain4j & Ollama Configuration
# ===============================
lc4j.ollama.base-url=http://localhost:11434
lc4j.ollama.chat-model.tier1.model-name=qwen2.5:0.5b
lc4j.ollama.chat-model.tier2.model-name=phi3:mini
lc4j.ollama.chat-model.temperature=0.0
lc4j.ollama.embedding-model.model-name=nomic-embed-text