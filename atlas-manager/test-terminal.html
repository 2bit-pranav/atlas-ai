<!doctype html>
<html lang="en">
    <head>
        <title>Atlas WebSocket Terminal</title>
        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6.1.2/bundles/stomp.umd.min.js"></script>
        <style>
            body {
                background: #1e1e1e;
                color: #00ff00;
                font-family: monospace;
                padding: 20px;
            }
            input,
            select,
            button {
                background: #333;
                color: #00ff00;
                border: 1px solid #00ff00;
                padding: 8px;
                font-family: monospace;
                font-size: 14px;
            }
            input:focus,
            select:focus {
                outline: none;
                background: #444;
            }
            form {
                display: flex;
                gap: 8px;
                align-items: center;
                flex-wrap: wrap;
            }
            label {
                margin-right: 10px;
            }
        </style>
    </head>
    <body>
        <h2>Atlas Live Terminal</h2>

        <div style="margin-bottom: 15px">
            <label for="agentSelect">Target Agent:</label>
            <select id="agentSelect">
                <option value="JOB_RESEARCH">JOB_RESEARCH</option>
                <option value="YT_EXTRACTION">YT_EXTRACTION</option>
                <option value="FORM_FILL">FORM_FILL</option>
            </select>
        </div>

        <form id="messageForm">
            <label for="msg" style="position: absolute; left: -9999px"
                >Message</label
            >
            <input
                id="msg"
                type="text"
                placeholder="Type a message..."
                style="width: 400px"
            />
            <button type="submit" style="cursor: pointer">Send</button>
        </form>

        <div id="logs" style="margin-top: 20px; white-space: pre-wrap"></div>

        <script>
            const stompClient = new StompJs.Client({
                brokerURL: "ws://localhost:8080/atlas-ws",
                onConnect: () => {
                    log("🟢 CONNECTED to Spring Boot!");
                    stompClient.subscribe("/topic/chat-stream", (message) => {
                        log("🤖 ATLAS: " + message.body);
                    });
                },
                onStompError: (frame) => {
                    log("🔴 ERROR: " + frame.headers["message"]);
                },
            });

            stompClient.activate();

            document.getElementById("messageForm").addEventListener("submit", (event) => {
                event.preventDefault();
                sendMessage();
            });

            function sendMessage() {
                const textInput = document.getElementById("msg");
                const text = textInput.value.trim();
                if (!text) return;

                const selectedAgent = document.getElementById("agentSelect").value;
                log("\n👤 YOU [" + selectedAgent + "]: " + text);

                stompClient.publish({
                    destination: "/app/chat",
                    body: "[" + selectedAgent + "] " + text,
                    headers: {
                        "content-type": "text/plain",
                    },
                });

                textInput.value = "";
            }

            function log(message) {
                const logsDiv = document.getElementById("logs");
                logsDiv.innerText += message + "\n";
                window.scrollTo(0, document.body.scrollHeight);
            }
        </script>
    </body>
</html>
